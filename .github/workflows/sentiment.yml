name: Update RTO Sentiment Data
on:
  schedule:
    - cron: '0 10 * * *' # Daily at 10am UTC
  workflow_dispatch: # Manual trigger button

jobs:
  update-sentiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run sentiment scraper
        run: python scripts/scrape_sentiment.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sentiment-data.json
          git diff --cached --quiet || git commit -m "chore: update sentiment data $(date -u +%Y-%m-%d)"
          git push
